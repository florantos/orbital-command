name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: orbital
          POSTGRES_PASSWORD: orbital
          POSTGRES_DB: orbital_command_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U orbital -d orbital_command_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: backend

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgres://orbital:orbital@localhost:5432/orbital_command_test?sslmode=disable
          PORT: 8080
          APP_ENV: test
          LOG_LEVEL: debug
        run: go test ./...

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "25"

      - name: Install pnpm
        run: npm install -g pnpm@10.27.0

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run linter
        working-directory: frontend
        run: pnpm lint

      - name: Build check
        working-directory: frontend
        run: pnpm build
