services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: orbital
      POSTGRES_PASSWORD: orbital
      POSTGRES_DB: orbital_command
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbital -d orbital_command"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - /app/tmp
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://orbital:orbital@postgres:5432/orbital_command?sslmode=disable
      PORT: 8080
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
